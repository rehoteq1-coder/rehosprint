<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RehoSprint — Live Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="display.css">
</head>
<body class="display-body">

  <div class="track" aria-hidden="true"><div class="lane"></div><div class="lane"></div><div class="lane"></div></div>

  <!-- WAITING: PIN + join instructions -->
  <section id="d-waiting" class="d-panel active">
    <div class="d-brand-mark">R<span class="dot">.</span>SPRINT</div>
    <p class="d-event-name" id="d-event-name">—</p>
    <p class="d-join-label">Join at <strong>rehosprint.rehoteq.com</strong> with PIN</p>
    <div class="d-pin" id="d-pin">— — — —</div>
    <div class="d-joined-count"><span id="d-joined-num">0</span> players joined</div>
  </section>

  <!-- LIVE QUESTION -->
  <section id="d-live" class="d-panel">
    <div class="d-live-top">
      <span class="d-progress" id="d-progress">Question 1 of 10</span>
      <span class="d-timer" id="d-timer">--</span>
    </div>
    <img id="d-question-image" class="d-question-image hidden" src="" alt="">
    <h1 class="d-question-text" id="d-question-text">—</h1>
    <div class="d-options" id="d-options"></div>
    <div class="d-answered-bar">
      <div class="d-answered-fill" id="d-answered-fill"></div>
    </div>
    <p class="d-answered-label"><span id="d-answered-num">0</span> / <span id="d-total-num">0</span> answered</p>
  </section>

  <!-- REVEAL -->
  <section id="d-reveal" class="d-panel">
    <p class="d-progress" id="d-reveal-progress">Question 1</p>
    <h1 class="d-question-text" id="d-reveal-question-text">—</h1>
    <div class="d-options" id="d-reveal-options"></div>
    <div class="d-fastest-wrap">
      <p class="d-fastest-title">⚡ Fastest Correct Answers</p>
      <div class="d-fastest-list" id="d-fastest-list"></div>
    </div>
  </section>

  <!-- CHAMPIONS LADDER -->
  <section id="d-ended" class="d-panel">
    <h1 class="d-ladder-title">🏆 Champions Ladder</h1>
    <div class="d-ladder" id="d-ladder"></div>
  </section>

  <!-- DRAW: SHUFFLING -->
  <section id="d-draw-shuffling" class="d-panel">
    <div class="d-brand-mark" style="font-size:clamp(30px,5vw,48px);">\uD83C\uDFB2 DRAWING GROUPS</div>
    <p class="d-event-name">Get ready...</p>
    <div class="draw-marquee-wrap">
      <div class="draw-marquee" id="draw-marquee-track"></div>
    </div>
  </section>

  <!-- DRAW: REVEALING -->
  <section id="d-draw-revealing" class="d-panel">
    <div class="d-live-top" style="width:100%;">
      <span class="d-progress">\uD83C\uDFC6 GROUP STAGE DRAW</span>
      <span class="d-progress" id="draw-reveal-progress">0 / 0 Groups</span>
    </div>
    <div class="draw-groups-board" id="draw-groups-board"></div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared.js"></script>
  <script src="display.js"></script>
</body>
</html>
